<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios Atividade 7</title>
    <link rel="stylesheet" href="Exercício 7.css">
</head>
<body>

    <div class="exercicio">
        <h2>Exercício 1: Botão de Alerta</h2>
        <button id="btnMensagem">Clique aqui</button>
    </div>
    <hr>

    <div class="exercicio">
        <h2>Exercício 2: Lista de Tarefas</h2>
        <input type="text" id="novaTarefa" placeholder="Nova tarefa...">
        <button id="btnTarefa">Adicionar</button>
        <ul id="listaTarefas"></ul>
    </div>
    <hr>

    <div class="exercicio">
        <h2>Exercício 3: Mostrar Nome do Aluno</h2>
        <input type="text" id="nomeAluno" placeholder="Nome do aluno">
        <button id="btnMostrar">Mostrar Nome</button>
        <p id="resultadoNome">O nome aparecerá aqui</p>
    </div>
    <hr>

    <div class="exercicio">
        <h2>Exercício 4: Validar Formulário</h2>
        <form id="meuFormulario">
            <input type="text" id="campoObrigatorio" placeholder="Preenchimento obrigatório">
            <button type="submit">Enviar</button>
        </form>
    </div>
    <hr>

    <div class="exercicio">
        <h2>Exercício 5: Cadastro Rápido de Aviso</h2>
        <input type="text" id="aviso" placeholder="Digite o aviso">
        <button id="botaoAviso">Adicionar Aviso</button>
        <ul id="listaAvisos"></ul>
    </div>

    <script>
        const botaoMsg = document.querySelector('#btnMensagem');
        botaoMsg.addEventListener('click', () => {
            alert('Olá! Você clicou no botão.');
        });

        const inputTarefa = document.querySelector('#novaTarefa');
        const btnTarefa = document.querySelector('#btnTarefa');
        const listaTarefas = document.querySelector('#listaTarefas');

        btnTarefa.addEventListener('click', () => {
            if (inputTarefa.value.trim() !== '') {
                const li = document.createElement('li');
                li.textContent = inputTarefa.value;
                listaTarefas.appendChild(li);
                inputTarefa.value = '';
            }
        });

        const inputNome = document.querySelector('#nomeAluno');
        const btnMostrar = document.querySelector('#btnMostrar');
        const resultado = document.querySelector('#resultadoNome');

        btnMostrar.addEventListener('click', () => {
            if (inputNome.value.trim() !== '') {
                resultado.textContent = `Aluno: ${inputNome.value}`;
            }
        });

        const formulario = document.querySelector('#meuFormulario');
        const campo = document.querySelector('#campoObrigatorio');

        formulario.addEventListener('submit', (evento) => {
            if (campo.value.trim() === '') {
                evento.preventDefault(); 
                alert('Erro: O campo não pode estar vazio!');
            } else {
                evento.preventDefault();
                alert('Enviado com sucesso!');
                campo.value = '';
            }
        });

        const campoAviso = document.querySelector('#aviso');
        const botaoAviso = document.querySelector('#botaoAviso');
        const listaAvisos = document.querySelector('#listaAvisos');

        botaoAviso.addEventListener('click', () => {
            const texto = campoAviso.value.trim();
            if (texto === '') {
                alert('Digite um aviso antes de adicionar.');
                return;
            }
            const item = document.createElement('li');
            item.textContent = texto;
            listaAvisos.appendChild(item);
            campoAviso.value = '';
            campoAviso.focus();
        });
    </script>

</body>
</html>
